<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense &amp; Budget Visualizer</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header>
    <h1>Expense &amp; Budget Visualizer</h1>
    <div id="balance-display">Total: $<span id="balance-amount">0.00</span></div>
  </header>

  <main>
    <section id="form-section">
      <h2>Add Expense</h2>
      <form id="expense-form" novalidate>
        <label for="item-name">Item Name</label>
        <input type="text" id="item-name" name="item-name" placeholder="e.g. Coffee" required />

        <label for="amount">Amount ($)</label>
        <input type="number" id="amount" name="amount" min="0.01" step="any" placeholder="0.00" required />

        <label for="category">Category</label>
        <select id="category" name="category" required>
          <option value="">-- Select --</option>
          <option value="Food">Food</option>
          <option value="Transport">Transport</option>
          <option value="Fun">Fun</option>
        </select>

        <p id="form-error" role="alert" aria-live="polite"></p>

        <button type="submit" id="submit-btn">Add Transaction</button>
      </form>
    </section>

    <section id="category-section">
      <h2>Custom Categories</h2>
      <div id="category-form">
        <input type="text" id="category-name" placeholder="Category name" />
        <input type="color" id="category-color" value="#888888" />
        <button type="button" id="add-category-btn">Add</button>
      </div>
      <p id="category-error" role="alert" aria-live="polite"></p>
      <ul id="category-list"></ul>
    </section>

    <section id="chart-section">
      <h2>Spending by Category</h2>
      <canvas id="spending-chart"></canvas>
    </section>

    <section id="list-section">
      <h2>Transactions</h2>
      <label for="sort-control">Sort by</label>
      <select id="sort-control">
        <option value="date-added">Date Added</option>
        <option value="amount-asc">Amount ↑</option>
        <option value="amount-desc">Amount ↓</option>
        <option value="category-az">Category A–Z</option>
        <option value="category-za">Category Z–A</option>
      </select>
      <ul id="transaction-list"></ul>
    </section>

    <section id="summary-section">
      <h2>Monthly Summary</h2>
      <ul id="summary-list"></ul>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
